name: AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from latest tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update PKGBUILD source metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PKGBUILD_PATH="aur/shiorii-bin/PKGBUILD"
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          ASSET_NAME=$(gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name | select(endswith("_linux_amd64.tar.gz"))' | head -n1)

          if [ -z "$ASSET_NAME" ]; then
            echo "No linux amd64 tar.gz asset found for v${VERSION}" >&2
            exit 1
          fi

          gh release download "v${VERSION}" --repo "$GITHUB_REPOSITORY" --pattern "$ASSET_NAME" --dir "$TMP_DIR" --clobber
          SHA256=$(sha256sum "$TMP_DIR/$ASSET_NAME" | awk '{print $1}')

          awk -v version="$VERSION" -v sha="$SHA256" '
            /^pkgver=/ {
              print "pkgver=" version
              next
            }
            /^pkgrel=/ {
              print "pkgrel=1"
              next
            }
            /^source=\(/ {
              print "source=(\"Shiori_${pkgver}_linux_amd64.tar.gz::https://github.com/vinayydv3695/Shiori/releases/download/v${pkgver}/Shiori_${pkgver}_linux_amd64.tar.gz\")"
              next
            }
            /^sha256sums=\(/ {
              print "sha256sums=(\"" sha "\")"
              next
            }
            { print }
          ' "$PKGBUILD_PATH" > "$PKGBUILD_PATH.new"

          mv "$PKGBUILD_PATH.new" "$PKGBUILD_PATH"

      - name: Generate AUR .SRCINFO files
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/pkg" -w /pkg archlinux:latest bash -c "cd aur/shiorii-git && makepkg --printsrcinfo > .SRCINFO && cd /pkg/aur/shiorii-bin && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push PKGBUILD updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aur/
          git diff --staged --quiet || git commit -m "chore: update AUR package to v$VERSION"
          git push origin HEAD:main
