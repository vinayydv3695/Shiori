name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Check if version actually changed ──────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Guard version consistency
        run: |
          python3 - <<'PY'
          import json
          import tomllib

          with open('package.json', 'r', encoding='utf-8') as f:
              package_version = json.load(f)['version']

          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
              tauri_version = json.load(f)['version']

          with open('src-tauri/Cargo.toml', 'rb') as f:
              cargo_version = tomllib.load(f)['package']['version']

          versions = {
              'package.json': package_version,
              'src-tauri/tauri.conf.json': tauri_version,
              'src-tauri/Cargo.toml': cargo_version,
          }

          if len(set(versions.values())) != 1:
              print('Version mismatch detected:')
              for name, version in versions.items():
                  print(f'  {name}: {version}')
              raise SystemExit(1)

          print(f"Versions are consistent: {package_version}")
          PY

      - name: Check if version changed
        id: check
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from the parent commit
          git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null || echo '{"version":"0.0.0"}' > /tmp/prev-package.json
          PREV_VERSION=$(node -p "require('/tmp/prev-package.json').version")
          echo "Previous version: $PREV_VERSION"

          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          fi

  # ── Step 2: Build for all platforms ────────────────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — builds deb, rpm, AppImage
          - platform: ubuntu-22.04
            rust_targets: ''
            args: ''

          # Windows — builds NSIS installer
          - platform: windows-latest
            rust_targets: ''
            args: ''

          # macOS — Apple Silicon (M1+)
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

          # macOS — Intel
          - platform: macos-latest
            rust_targets: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ── Sync versions: package.json → tauri.conf.json & Cargo.toml ──
      - name: Sync version to Tauri config
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "Syncing version $VERSION across all config files"

          # Update tauri.conf.json
          if command -v python3 &> /dev/null; then
            python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              config = json.load(f)
          config['version'] = '$VERSION'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(config, f, indent=2)
              f.write('\n')
          "
          fi

          # Update Cargo.toml version
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          else
            sed -i'' -e "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          fi

      # ── Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ── Setup Rust ──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # ── Cache Rust dependencies ──
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      # ── Linux system dependencies ──
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # ── Install frontend dependencies ──
      - name: Install frontend dependencies
        run: npm ci

      # ── Build with Tauri Action ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: 'Shiori v${{ needs.check-version.outputs.version }}'
          releaseBody: |
            ## Shiori v${{ needs.check-version.outputs.version }}

            Download the appropriate installer for your platform:

            | Platform | File |
            |----------|------|
            | **Windows** | `.exe` (NSIS installer) |
            | **macOS (Apple Silicon)** | `.dmg` (aarch64) |
            | **macOS (Intel)** | `.dmg` (x64) |
            | **Linux (Debian/Ubuntu)** | `.deb` |
            | **Linux (Fedora/RHEL)** | `.rpm` |
            | **Linux (Universal)** | `.AppImage` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Step 3: Update AUR packages after release ──────────────────────
  update-aur:
    name: Update AUR packages
    needs: [check-version, build]
    if: |
      always() &&
      (needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing required secret: AUR_SSH_PRIVATE_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur_id_ed25519
          chmod 600 ~/.ssh/aur_id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Monitor release asset with gh and capture checksum
        id: release-meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          ASSET_NAME=""
          SHA256=""

          for attempt in {1..30}; do
            RELEASE_JSON=""
            RELEASE_JSON="$(gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --json isDraft,assets 2>/dev/null || true)"
            if [ -z "$RELEASE_JSON" ]; then
              echo "Waiting for release v${VERSION} to exist (${attempt}/30)..."
              sleep 20
              continue
            fi

            IS_DRAFT="$(printf '%s' "$RELEASE_JSON" | python3 -c 'import json,sys; print(str(json.load(sys.stdin).get("isDraft", True)).lower())' 2>/dev/null || echo "true")"
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Release v${VERSION} is still draft (${attempt}/30)..."
              sleep 20
              continue
            fi

            if ! printf '%s' "$RELEASE_JSON" | python3 -c 'import json,sys; a=[x.get("name","") for x in json.load(sys.stdin).get("assets",[])]; ok=any(n.endswith(".exe") for n in a) and any(n.endswith(".AppImage") for n in a) and any(n.endswith(".rpm") for n in a) and any(n.endswith("_amd64.deb") for n in a) and any(n.endswith(".dmg") for n in a); sys.exit(0 if ok else 1)'; then
              echo "Waiting for all required release assets (.exe, .AppImage, .rpm, _amd64.deb, .dmg) (${attempt}/30)..."
              sleep 20
              continue
            fi

            ASSET_NAME="$(printf '%s' "$RELEASE_JSON" | python3 -c 'import json,sys; a=[x.get("name","") for x in json.load(sys.stdin).get("assets",[]) if x.get("name","").endswith("_amd64.deb")]; print(a[0] if a else "")')"
            if [ -z "$ASSET_NAME" ]; then
              echo "Waiting for _amd64.deb asset name (${attempt}/30)..."
              sleep 20
              continue
            fi

            DIGEST="$(gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --json assets --jq ".assets[] | select(.name == \"${ASSET_NAME}\") | .digest" 2>/dev/null || true)"
            if [ -n "$DIGEST" ]; then
              SHA256="${DIGEST#sha256:}"
              break
            fi

            if gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --json assets --jq ".assets[] | select(.name == \"${ASSET_NAME}\") | .name" | grep -q "${ASSET_NAME}"; then
              gh release download "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --pattern "${ASSET_NAME}" --dir /tmp --clobber
              SHA256="$(sha256sum "/tmp/${ASSET_NAME}" | cut -d' ' -f1)"
              if [ -n "$SHA256" ]; then
                break
              fi
            fi

            echo "Waiting for release asset ${ASSET_NAME} (${attempt}/30)..."
            sleep 20
          done

          if [ -z "$ASSET_NAME" ] || [ -z "$SHA256" ]; then
            echo "Could not find release asset ${ASSET_NAME} in release v${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update shiori-ebook (source package)
        env:
          VERSION: ${{ steps.release-meta.outputs.version }}
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur_id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          set -euo pipefail

          git clone "ssh://aur@aur.archlinux.org/shiori-ebook.git"
          cd shiori-ebook

          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i -E "s/^[[:space:]]*pkgver = .*/\tpkgver = ${VERSION}/" .SRCINFO
          sed -i -E "s|^[[:space:]]*source = .*|\tsource = shiori-ebook-${VERSION}.tar.gz::https://github.com/vinayydv3695/Shiori/archive/refs/tags/v${VERSION}.tar.gz|" .SRCINFO

          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "shiori-ebook already up to date"
            exit 0
          fi

          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "Update to v${VERSION}"
          git push origin master

      - name: Update shiori-ebook-bin (binary package)
        env:
          VERSION: ${{ steps.release-meta.outputs.version }}
          ASSET_NAME: ${{ steps.release-meta.outputs.asset_name }}
          SHA256: ${{ steps.release-meta.outputs.sha256 }}
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur_id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          set -euo pipefail

          git clone "ssh://aur@aur.archlinux.org/shiori-ebook-bin.git"
          cd shiori-ebook-bin

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          asset_name = os.environ["ASSET_NAME"]
          sha256 = os.environ["SHA256"]

          pkgbuild_path = Path("PKGBUILD")
          srcinfo_path = Path(".SRCINFO")

          pkgbuild = pkgbuild_path.read_text()
          pkgbuild = re.sub(r"^pkgver=.*$", f"pkgver={version}", pkgbuild, flags=re.MULTILINE)
          pkgbuild = re.sub(
              r"^source=.*$",
              f"source=(\"{asset_name}::" + "${url}" + "/releases/download/v" + "${pkgver}" + f"/{asset_name}\")",
              pkgbuild,
              flags=re.MULTILINE,
          )
          pkgbuild = re.sub(r"^sha256sums=\('.*'\)$", f"sha256sums=('{sha256}')", pkgbuild, flags=re.MULTILINE)

          package_block = """package() {
              # Extract .deb package
              bsdtar -xf \"Shiori_${pkgver}_amd64.deb\"
              bsdtar -xf data.tar.* -C \"${pkgdir}\"

              # Fix permissions
              chmod -R u+rwX,go+rX,go-w \"${pkgdir}\"
          }"""
          pkgbuild = re.sub(r"package\(\)\s*\{[\s\S]*?\n\}", package_block, pkgbuild, flags=re.MULTILINE)
          pkgbuild_path.write_text(pkgbuild)

          srcinfo = srcinfo_path.read_text()
          srcinfo = re.sub(r"^[ \t]*pkgver = .*$", f"\tpkgver = {version}", srcinfo, flags=re.MULTILINE)
          srcinfo = re.sub(
              r"^[ \t]*source = .*$",
              f"\tsource = {asset_name}::https://github.com/vinayydv3695/Shiori/releases/download/v{version}/{asset_name}",
              srcinfo,
              flags=re.MULTILINE,
          )
          srcinfo = re.sub(r"^[ \t]*sha256sums = .*$", f"\tsha256sums = {sha256}", srcinfo, flags=re.MULTILINE)
          srcinfo_path.write_text(srcinfo)
          PY

          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "shiori-ebook-bin already up to date"
            exit 0
          fi

          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "Update to v${VERSION}"
          git push origin master

      - name: Verify AUR metadata is updated
        env:
          VERSION: ${{ steps.release-meta.outputs.version }}
        run: |
          set -euo pipefail
          EXPECTED="${VERSION}-1"

          for attempt in {1..30}; do
            SRC_VERSION="$(curl -fsSL "https://aur.archlinux.org/rpc/v5/info/shiori-ebook" | python3 -c 'import json,sys; print(json.load(sys.stdin)["results"][0]["Version"])')"
            BIN_VERSION="$(curl -fsSL "https://aur.archlinux.org/rpc/v5/info/shiori-ebook-bin" | python3 -c 'import json,sys; print(json.load(sys.stdin)["results"][0]["Version"])')"

            echo "Attempt ${attempt}/30 => shiori-ebook=${SRC_VERSION}, shiori-ebook-bin=${BIN_VERSION}, expected=${EXPECTED}"

            if [ "$SRC_VERSION" = "$EXPECTED" ] && [ "$BIN_VERSION" = "$EXPECTED" ]; then
              echo "AUR packages updated successfully"
              exit 0
            fi

            sleep 20
          done

          echo "Timed out waiting for AUR metadata to update"
          exit 1
