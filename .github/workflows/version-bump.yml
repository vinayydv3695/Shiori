name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version number (e.g. 1.1.0 — no v prefix)"
        required: true
        type: string
      release_notes:
        description: "Release notes for this version"
        required: false
        default: "See commit history for changes."
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate semver
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use x.y.z"
            exit 1
          fi

      - name: Update versions atomically
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"

          tmp_tauri=$(mktemp)
          tmp_package=$(mktemp)
          tmp_cargo=$(mktemp)

          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp_tauri"
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp_package"
          sed -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$VERSION"'"/;}' src-tauri/Cargo.toml > "$tmp_cargo"

          mv "$tmp_tauri" src-tauri/tauri.conf.json
          mv "$tmp_package" package.json
          mv "$tmp_cargo" src-tauri/Cargo.toml

      - name: Commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"
