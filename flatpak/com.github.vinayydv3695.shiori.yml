app-id: com.github.vinayydv3695.shiori
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm18
command: shiori

build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin
  env:
    LIBCLANG_PATH: /usr/lib/sdk/llvm18/lib
    LIBRARY_PATH: /app/lib
    LD_LIBRARY_PATH: /app/lib

finish-args:
  # Network access (needed for reading some book metadata if fetched online)
  - --share=network
  # X11 + Wayland windowing
  - --socket=fallback-x11
  - --socket=wayland
  # GPU acceleration
  - --device=dri
  # Filesystem access for the library
  - --filesystem=home
  # Access to host speech-dispatcher daemon for TTS
  - --filesystem=xdg-run/speech-dispatcher

modules:
  - name: dotconf
    buildsystem: simple
    build-commands:
      - autoreconf -vfi
      - ./configure --prefix=/app --disable-static
      - make
      - make install
    sources:
      - type: archive
        url: https://github.com/williamh/dotconf/archive/v1.3.tar.gz
        sha256: 7f1ecf40de1ad002a065a321582ed34f8c14242309c3547ad59710ae3c805653

  - name: speech-dispatcher
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --without-espeak
      - --without-flite
      - --without-pulse
      - --without-alsa
      - --disable-python
    sources:
      - type: archive
        url: https://github.com/brailcom/speechd/releases/download/0.11.5/speech-dispatcher-0.11.5.tar.gz
        sha256: 1ce4759ffabbaf1aeb433a5ec0739be0676e9bdfbae9444a7b3be1b2af3ec12b

  - name: shiori
    buildsystem: simple
    build-commands:
      # Install Node dependencies
      - npm ci
      # Build the frontend (Vite)
      - npx tsc -b && npx vite build
      # Build the Tauri Rust backend directly (bypasses Tauri CLI bundler which crashes on appindicator check)
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      # Install the built binary
      - install -Dm755 src-tauri/target/release/shiori /app/bin/shiori
      # Install the application icons
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.github.vinayydv3695.shiori.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/com.github.vinayydv3695.shiori.png
      # Install the desktop file and metainfo
      - install -Dm644 flatpak/com.github.vinayydv3695.shiori.desktop /app/share/applications/com.github.vinayydv3695.shiori.desktop
      - install -Dm644 flatpak/com.github.vinayydv3695.shiori.metainfo.xml /app/share/metainfo/com.github.vinayydv3695.shiori.metainfo.xml
    sources:
      - type: dir
        path: ..
      - node-sources.json
      - cargo-sources.json

  - name: appindicator-bundle
    buildsystem: simple
    build-commands: []
    modules:
      - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
